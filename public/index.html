<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dino Runner — Multiplayer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <canvas id="game" width="800" height="300"></canvas>

    <div id="screens">
      <section id="menu" class="screen">
        <h1>DINO RUNNER</h1>
        <input id="name" maxlength="12" placeholder="Your name" autocomplete="off" />
        <div class="avatar-row">
          <img id="avatar-preview" class="avatar-chip hidden" alt="your face sticker" />
          <button id="btn-avatar" class="ghost-btn">📷 Add your face</button>
          <button id="btn-avatar-remove" class="ghost-btn hidden" title="Remove photo">✕</button>
        </div>
        <div class="btn-row">
          <button id="btn-solo">Play solo</button>
          <button id="btn-create">Create room</button>
        </div>
        <div class="join-row">
          <input id="join-code" maxlength="4" placeholder="CODE" autocomplete="off" />
          <button id="btn-join">Join room</button>
        </div>
        <p id="menu-error" class="error"></p>
      </section>

      <section id="lobby" class="screen hidden">
        <h2>Room <span id="room-code"></span></h2>
        <p class="small">Invite friends: <a id="room-link" href="#" target="_blank"></a></p>
        <ul id="player-list"></ul>
        <button id="btn-start">Start race</button>
        <p id="lobby-wait" class="small hidden">Waiting for the host to start&hellip;</p>
        <button id="btn-lobby-leave" class="ghost-btn">Leave</button>
      </section>

      <section id="gameover" class="screen hidden">
        <h2 id="winner-line"></h2>
        <ol id="standings"></ol>
        <button id="btn-rematch">Rematch</button>
        <p id="rematch-wait" class="small hidden">Waiting for the host&hellip;</p>
        <button id="btn-leave" class="ghost-btn">Leave room</button>
      </section>
    </div>

    <div id="camera-modal" class="hidden">
      <div class="camera-box">
        <h2>Center your face</h2>
        <div class="cam-wrap">
          <video id="camera-video" playsinline muted autoplay></video>
          <div class="cam-ring"></div>
        </div>
        <div class="btn-row">
          <button id="btn-camera-snap">Capture</button>
          <button id="btn-camera-cancel" class="ghost-btn">Cancel</button>
        </div>
        <p id="camera-error" class="error"></p>
      </div>
    </div>

    <p class="hint">
      <span class="desktop-hint">Press <kbd>Space</kbd> / <kbd>&uarr;</kbd> to jump &middot; <kbd>&darr;</kbd> to duck &middot; <kbd>Esc</kbd> for menu</span>
      <span class="touch-hint">Tap to jump &middot; hold to duck</span>
    </p>
  </main>
  <script src="game.js"></script>
  <script src="avatar.js"></script>
  <script src="net.js"></script>
</body>
</html>
